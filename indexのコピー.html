<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股関節JOAスコア計算</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        .container {
            max-width: 720px;
        }
        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">股関節JOAスコア計算</h1>

        <form id="joa-form">
            <!-- 疼痛 (40点) -->
            <div class="mb-4">
                <h2 class="h4">1. 疼痛 (Pain) - 40点</h2>
                <div class="mb-3">
                    <label for="pain" class="form-label">現在の痛みの程度を選択してください。</label>
                    <select class="form-select" id="pain">
                        <option value="40">なし、あるいはほとんど忘れている</option>
                        <option value="30">強い痛みはないが、ときにうずいたり、手術を意識させられることがある</option>
                        <option value="20">歩行には支障がないが、階段昇降、起立、長時間歩行などで痛みがある</option>
                        <option value="10">歩行中、常に痛みがある</option>
                        <option value="0">安静時にも痛みがある</option>
                    </select>
                </div>
            </div>

            <!-- 可動域 (20点) -->
            <div class="mb-4">
                <h2 class="h4">2. 可動域 (Range of Motion) - 20点</h2>
                <div class="mb-3">
                    <label for="rom" class="form-label">股関節の動きの制限の程度を選択してください。</label>
                    <select class="form-select" id="rom">
                        <option value="20">正常可動域の2/3以上</option>
                        <option value="15">正常可動域の1/2〜2/3</option>
                        <option value="10">正常可動域の1/3〜1/2</option>
                        <option value="5">正常可動域の1/3未満</option>
                        <option value="0">強直またはそれに近い状態</option>
                    </select>
                </div>
            </div>

            <!-- 歩行能力 (20点) -->
            <div class="mb-4">
                <h2 class="h4">3. 歩行能力 (Gait) - 20点</h2>
                <div class="mb-3">
                    <label for="gait" class="form-label">歩行能力を選択してください。</label>
                    <select class="form-select" id="gait">
                        <option value="20">30分以上、普通に歩ける</option>
                        <option value="15">杖なしで15〜30分歩ける</option>
                        <option value="10">杖を使えば30分以上歩ける</option>
                        <option value="5">杖を使っても15分くらいしか歩けない</option>
                        <option value="0">室内でも杖が必要、または歩行不能</option>
                    </select>
                </div>
            </div>

            <!-- 日常生活動作 (20点) -->
            <div class="mb-4">
                <h2 class="h4">4. 日常生活動作 (Activities of Daily Living) - 20点</h2>
                <div class="mb-3">
                    <label for="adl" class="form-label">日常生活の動作について選択してください。</label>
                    <select class="form-select" id="adl">
                        <option value="20">支障なくできる</option>
                        <option value="15">多少の困難はあるが、いずれも自分でできる</option>
                        <option value="10">靴下、爪切り、足指を洗う動作などにかなりの困難を伴う</option>
                        <option value="5">上記の動作が不可能</option>
                    </select>
                </div>
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="calculateScore()">スコアを計算する</button>
        </form>

        <div class="mt-5 p-4 bg-light rounded">
            <h2 class="h4">合計スコア</h2>
            <p class="result-box" id="total-score">0 点</p>
        </div>
    </div>

    <script>
        function calculateScore() {
            const painScore = parseInt(document.getElementById('pain').value);
            const romScore = parseInt(document.getElementById('rom').value);
            const gaitScore = parseInt(document.getElementById('gait').value);
            const adlScore = parseInt(document.getElementById('adl').value);

            const totalScore = painScore + romScore + gaitScore + adlScore;

            document.getElementById('total-score').innerText = totalScore + ' 点';
        }
    </script>
</body>
</html>
